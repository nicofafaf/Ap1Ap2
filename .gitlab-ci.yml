# GitLab Pages: ein Job = bauen + veröffentlichen (weniger kann schiefgehen)
# Du: pushen auf den Standard-Branch → Pipeline grün → Seite neu laden (Strg+F5)

image: node:20

stages:
  - deploy

variables:
  NODE_ENV: production
  # große Vite-/Asset-Builds: weniger OOM auf GitLab Runnern
  NODE_OPTIONS: "--max-old-space-size=4096"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

pages:
  stage: deploy
  script:
    - "npm ci"
    - "npm run build"
    - "test -d dist && test -d dist/assets"
    - "rm -rf public"
    - "mv dist public"
    - "test -d public/assets"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
