# GitLab Pages: ein Job = bauen + veröffentlichen (weniger kann schiefgehen)
# Du: pushen auf den Standard-Branch → Pipeline grün → Seite neu laden (Strg+F5)

image: node:20

stages:
  - deploy

variables:
  # Kein NODE_ENV=production vor "npm ci" — sonst fehlen devDependencies (vite → "vite: not found")
  NODE_OPTIONS: "--max-old-space-size=4096"

cache:
  key: "v3-${CI_COMMIT_REF_SLUG}"
  paths:
    - node_modules/

pages:
  stage: deploy
  script:
    - "npm ci"
    - "npm run build"
    - "test -d dist && test -d dist/assets"
    - "rm -rf public"
    - "mv dist public"
    - "test -d public/assets"
  pages:
    publish: public
  artifacts:
    paths:
      - public
      - public/**/*
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
